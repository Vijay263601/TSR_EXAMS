<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MCQ Builder</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family: Arial, sans-serif;
  background:#f1f5f9;
  padding:20px;
}
.container{
  max-width:700px;
  margin:auto;
  background:#fff;
  padding:25px;
  border-radius:12px;
}
label{
  font-weight:600;
  display:block;
  margin-top:12px;
}
input, textarea, select{
  width:100%;
  padding:10px;
  margin-top:6px;
}
.options{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
button{
  margin-top:20px;
  padding:12px;
  width:100%;
  background:#2563eb;
  color:#fff;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
.status{
  margin-top:12px;
  text-align:center;
  font-weight:600;
}
.success{ color:green }
.error{ color:red }
.preview img{
  max-width:100%;
  max-height:200px;
  margin-top:10px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="container">
<h2>MCQ Builder</h2>

<label>Exam ID</label>
<input id="examId">

<label>Question</label>
<textarea id="question" rows="3"></textarea>

<label>Question Image (optional)</label>
<input type="file" id="imageFile" accept="image/*">
<div class="preview" id="preview"></div>

<div class="options">
  <div><label>A</label><input id="a"></div>
  <div><label>B</label><input id="b"></div>
  <div><label>C</label><input id="c"></div>
  <div><label>D</label><input id="d"></div>
</div>

<label>Correct Answer</label>
<select id="correct">
  <option value="">Select</option>
  <option>A</option>
  <option>B</option>
  <option>C</option>
  <option>D</option>
</select>

<button onclick="addQuestion()">Add Question</button>
<div id="status" class="status"></div>
</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbyzARFGPJ6-nYRu-QGgwZ3dTgBCiSqpEqPvt6IGRSem1bIgD-E6aVYo4jxMz-x4H8AR/exec";

let imageBase64="";

/* IMAGE → BASE64 */
imageFile.addEventListener("change",()=>{
  const file=imageFile.files[0];
  if(!file){ imageBase64=""; preview.innerHTML=""; return; }

  const reader=new FileReader();
  reader.onload=()=>{
    imageBase64=reader.result;
    preview.innerHTML=`<img src="${imageBase64}">`;
  };
  reader.readAsDataURL(file);
});

function addQuestion(){
  const status=document.getElementById("status");

  if(!examId.value||!question.value||!a.value||!b.value||!c.value||!d.value||!correct.value){
    status.textContent="Fill all required fields";
    status.className="status error";
    return;
  }

  const payload={
    type:"ADD_QUESTION",
    examId:examId.value,
    qid:"Q_"+Date.now(),
    question:question.value,
    imageBase64:imageBase64,
    a:a.value,b:b.value,c:c.value,d:d.value,
    correct:correct.value
  };

  fetch(API_URL,{
    method:"POST",
    body:JSON.stringify(payload)
  })
  .then(r=>r.text())
  .then(t=>{
    const res=JSON.parse(t);
    if(res.status!=="QUESTION_ADDED") throw "Failed";

    if(imageBase64 && !res.imageURL) throw "Image not saved";

    status.textContent="Question added successfully";
    status.className="status success";

    question.value=a.value=b.value=c.value=d.value="";
    correct.value="";
    imageFile.value="";
    imageBase64="";
    preview.innerHTML="";
  })
  .catch(()=>{
    status.textContent="Error saving question or image";
    status.className="status error";
  });
}
</script>

</body>
</html>
