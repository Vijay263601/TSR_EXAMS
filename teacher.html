<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MCQ Builder</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    font-family: Arial;
    background: #f1f5f9;
    padding: 20px;
  }
  .container {
    max-width: 700px;
    margin: auto;
    background: #ffffff;
    padding: 25px;
    border-radius: 12px;
  }
  h2 { text-align: center; }
  label { font-weight: bold; display: block; margin-top: 12px; }
  input, textarea, select {
    width: 100%;
    padding: 12px;
    margin-top: 6px;
    border-radius: 6px;
    border: 1px solid #cbd5f5;
  }
  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  button {
    width: 100%;
    margin-top: 20px;
    padding: 14px;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
  }
  .success { color: green; text-align: center; }
  .error { color: red; text-align: center; }
</style>
</head>

<body>

<div class="container">
  <h2>MCQ Builder</h2>

  <label>Exam ID</label>
  <input id="examId">

  <label>Question</label>
  <textarea id="question" rows="3"></textarea>

  <div class="options">
    <div>
      <label>Option A</label>
      <input id="a">
    </div>
    <div>
      <label>Option B</label>
      <input id="b">
    </div>
    <div>
      <label>Option C</label>
      <input id="c">
    </div>
    <div>
      <label>Option D</label>
      <input id="d">
    </div>
  </div>

  <label>Correct Answer</label>
  <select id="correct">
    <option value="">Select</option>
    <option value="A">A</option>
    <option value="B">B</option>
    <option value="C">C</option>
    <option value="D">D</option>
  </select>

  <button onclick="addQuestion()">Add Question</button>

  <p id="status"></p>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzlHgoe1943X0O0ZUNj4RNF-lNlO2HBP_5s-32sTjDRudaOujV8KkrIsmC5yw3u/exec";
const token = localStorage.getItem("teacherToken");

if (!token) {
  alert("Session expired. Please login again.");
  window.location.href = "teacher.html";
}

examId.value = localStorage.getItem("lastExamId") || "";

function addQuestion() {
  if (!examId.value || !question.value || !a.value || !b.value || !c.value || !d.value || !correct.value) {
    status.textContent = "⚠ Fill all fields";
    status.className = "error";
    return;
  }

  const payload = {
    type: "ADD_QUESTION",
    token: token,
    examId: examId.value,
    qid: "Q_" + Date.now(),
    question: question.value,
    a: a.value,
    b: b.value,
    c: c.value,
    d: d.value,
    correct: correct.value
  };

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify(payload)
  })
  .then(r => r.json())
  .then(res => {
    if (res.error) {
      status.textContent = "❌ Session expired";
      status.className = "error";
      return;
    }
    status.textContent = "✅ Question added";
    status.className = "success";
    question.value = a.value = b.value = c.value = d.value = "";
    correct.value = "";
  });
}
</script>

</body>
</html>
