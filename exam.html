<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Online Exam</title>
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">

<style>
/* ===== BASIC UI ===== */
body{
  font-family: Arial, sans-serif;
  background:#f1f5f9;
  padding:16px;

  /* Mobile safety */
  -webkit-user-select:none;
  user-select:none;
  -webkit-touch-callout:none;
  overscroll-behavior:none;
  touch-action:manipulation;
}

.container{
  max-width:800px;
  margin:auto;
  background:#fff;
  padding:20px;
  border-radius:12px;
}

.hidden{ display:none }

.option{
  border:1px solid #ccc;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
}

.option.selected{
  background:#2563eb;
  color:#fff;
}

.timer{
  color:red;
  font-weight:bold;
}

input, button{
  width:100%;
  padding:10px;
  margin-top:10px;
  font-size:16px;
}
</style>
</head>

<body>

<!-- ===== STUDENT FORM ===== -->
<div class="container" id="studentForm">
  <h2>Student Details</h2>
  <input id="nameInput" placeholder="Name">
  <input id="emailInput" placeholder="Email">
  <input id="rollInput" placeholder="Roll No">
  <button onclick="startExam()">Start Exam</button>
</div>

<!-- ===== EXAM PAGE ===== -->
<div class="container hidden" id="examPage">
  <div>
    Exam: <span id="examIdText"></span>
    <span class="timer" id="timer"></span>
  </div>

  <h3 id="questionText"></h3>
  <div id="options"></div>

  <button onclick="prev()">Prev</button>
  <button onclick="next()">Next</button>
  <button onclick="submitExam()">Submit</button>
</div>

<script>
/* ================= CONFIG ================= */
const API_URL = "https://script.google.com/macros/s/AKfycbyzARFGPJ6-nYRu-QGgwZ3dTgBCiSqpEqPvt6IGRSem1bIgD-E6aVYo4jxMz-x4H8AR/exec";
const examId = new URLSearchParams(location.search).get("examId");
document.getElementById("examIdText").innerText = examId;

/* ================= STATE ================= */
let questions = [];
let answers = {};
let current = 0;
let duration = 0;
let timerInterval;
let startTime;
let examFinished = false;

/* ================= START EXAM ================= */
async function startExam(){
  if(!nameInput.value || !emailInput.value || !rollInput.value){
    alert("Fill all details");
    return;
  }

  studentForm.classList.add("hidden");
  examPage.classList.remove("hidden");

  try{
    /* ---- LOAD CONFIG ---- */
    const cfgRes = await fetch(API_URL,{
      method:"POST",
      body: JSON.stringify({ type:"GET_EXAM_CONFIG", examId })
    });
    const cfg = JSON.parse(await cfgRes.text());

    /* ---- LOAD QUESTIONS ---- */
    const qRes = await fetch(API_URL,{
      method:"POST",
      body: JSON.stringify({ type:"GET_QUESTIONS", examId })
    });
    questions = JSON.parse(await qRes.text());

    duration = Number(cfg.duration);

    if(!questions.length || !duration){
      alert("Exam data error");
      location.reload();
      return;
    }

  }catch(err){
    console.error(err);
    alert("Server not responding. Try again.");
    location.reload();
    return;
  }

  /* Fullscreen AFTER data loads (Android safe) */
  try{ document.documentElement.requestFullscreen(); }catch{}

  startTime = Date.now();
  render();
  startTimer();
}

/* ================= RENDER ================= */
function render(){
  const q = questions[current];
  if(!q) return;

  questionText.innerText = `Q${current+1}. ${q.question}`;
  options.innerHTML = "";

  ["A","B","C","D"].forEach(o=>{
    const div = document.createElement("div");
    div.className = "option" + (answers[q.qid]===o ? " selected" : "");
    div.innerText = q[o];
    div.onclick = ()=>{
      answers[q.qid] = o;
      render();
    };
    options.appendChild(div);
  });
}

function next(){
  if(current < questions.length-1){
    current++;
    render();
  }
}

function prev(){
  if(current > 0){
    current--;
    render();
  }
}

/* ================= TIMER ================= */
function startTimer(){
  let t = duration * 60;
  timerInterval = setInterval(()=>{
    timer.innerText = ` | ${Math.floor(t/60)}:${String(t%60).padStart(2,"0")}`;
    if(--t < 0){
      submitExam();
    }
  },1000);
}

/* ================= BLOCK BACK / REFRESH ================= */
history.pushState(null,null,location.href);
window.onpopstate = () => history.pushState(null,null,location.href);

window.addEventListener("beforeunload", e=>{
  e.preventDefault();
  e.returnValue = "";
});

/* ================= SUBMIT ================= */
function submitExam(){
  if(examFinished) return;
  examFinished = true;
  clearInterval(timerInterval);

  fetch(API_URL,{
    method:"POST",
    body: JSON.stringify({
      type:"SUBMIT_RESPONSE",
      examId,
      studentName:nameInput.value,
      roll:rollInput.value,
      email:emailInput.value,
      timeTaken:Math.floor((Date.now()-startTime)/1000),
      answers:Object.keys(answers).map(qid=>({
        qid,
        answer:answers[qid]
      }))
    })
  }).finally(()=>{
    document.body.innerHTML = "<h2>Exam Submitted</h2>";
    if(document.fullscreenElement) document.exitFullscreen();
  });
}
</script>

</body>
</html>
