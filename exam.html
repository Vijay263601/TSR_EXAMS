<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Online Exam</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  font-family: Arial, sans-serif;
  background:#f1f5f9;
  padding:16px;
}

.container{
  max-width:800px;
  margin:auto;
  background:#fff;
  padding:20px;
  border-radius:12px;
}

.hidden{ display:none }

.option{
  border:1px solid #ccc;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  cursor:pointer;
}

.option.selected{
  background:#2563eb;
  color:#fff;
}

.timer{
  color:red;
  font-weight:bold;
}

input, button{
  width:100%;
  padding:10px;
  margin-top:10px;
  font-size:16px;
}
</style>
</head>

<body>

<div class="container" id="studentForm">
  <h2>Student Details</h2>
  <input id="nameInput" placeholder="Name">
  <input id="emailInput" placeholder="Email">
  <input id="rollInput" placeholder="Roll No">
  <button onclick="startExam()">Start Exam</button>
</div>

<div class="container hidden" id="examPage">
  <div>
    Exam: <span id="examIdText"></span>
    <span class="timer" id="timer"></span>
  </div>

  <h3 id="questionText"></h3>
  <div id="options"></div>

  <button onclick="prev()">Prev</button>
  <button onclick="next()">Next</button>
  <button onclick="submitExam()">Submit</button>
</div>

<script>
/* ================= CONFIG ================= */
const API_URL="https://script.google.com/macros/s/AKfycbyzARFGPJ6-nYRu-QGgwZ3dTgBCiSqpEqPvt6IGRSem1bIgD-E6aVYo4jxMz-x4H8AR/exec";
const examId=new URLSearchParams(location.search).get("examId");
document.getElementById("examIdText").innerText=examId;

/* ================= DEVICE ================= */
const IS_ANDROID = /Android/i.test(navigator.userAgent);

/* ================= STATE ================= */
let questions=[],answers={},current=0;
let duration=0,timerInterval,startTime;
let examStarted=false,examFinished=false;

/* ================= START EXAM ================= */
async function startExam(){
  if(!nameInput.value||!emailInput.value||!rollInput.value){
    alert("Fill all details");
    return;
  }

  /* 🔒 FORCE FULLSCREEN */
  try{
    await document.documentElement.requestFullscreen();
  }catch{
    alert("Fullscreen is required to start the exam");
    return; // ❌ do not start exam
  }

  /* If fullscreen STILL not active (Android edge case) */
  if(!document.fullscreenElement && !IS_ANDROID){
    alert("Fullscreen is required to start the exam");
    document.exitFullscreen?.();
    return;
  }

  studentForm.classList.add("hidden");
  examPage.classList.remove("hidden");

  try{
    const cfgRes=await fetch(API_URL,{
      method:"POST",
      body:JSON.stringify({type:"GET_EXAM_CONFIG",examId})
    });
    const cfg=JSON.parse(await cfgRes.text());

    const qRes=await fetch(API_URL,{
      method:"POST",
      body:JSON.stringify({type:"GET_QUESTIONS",examId})
    });
    questions=JSON.parse(await qRes.text());

    duration=Number(cfg.duration);
    if(!questions.length||!duration) throw "Invalid exam";
  }catch{
    alert("Exam load error");
    document.exitFullscreen?.();
    return;
  }

  examStarted=true;
  startTime=Date.now();
  render();
  startTimer();
}

/* ================= RENDER ================= */
function render(){
  const q=questions[current];
  if(!q) return;

  questionText.innerText=`Q${current+1}. ${q.question}`;
  options.innerHTML="";
  ["A","B","C","D"].forEach(o=>{
    const d=document.createElement("div");
    d.className="option"+(answers[q.qid]===o?" selected":"");
    d.innerText=q[o];
    d.onclick=()=>{answers[q.qid]=o;render()};
    options.appendChild(d);
  });
}

function next(){ if(current<questions.length-1){current++;render()} }
function prev(){ if(current>0){current--;render()} }

/* ================= TIMER ================= */
function startTimer(){
  let t=duration*60;
  timerInterval=setInterval(()=>{
    timer.innerText=` | ${Math.floor(t/60)}:${String(t%60).padStart(2,"0")}`;
    if(--t<0) submitExam();
  },1000);
}

/* ================= SECURITY ================= */

/* TAB / APP SWITCH — ALL DEVICES */
document.addEventListener("visibilitychange",()=>{
  if(!examStarted||examFinished)return;
  if(document.hidden) submitExam();
});

/* FULLSCREEN EXIT — DESKTOP ONLY */
document.addEventListener("fullscreenchange",()=>{
  if(IS_ANDROID) return; // ignore android false triggers
  if(!examStarted||examFinished)return;
  if(!document.fullscreenElement) submitExam();
});

/* ================= SUBMIT ================= */
function submitExam(){
  if(examFinished)return;
  examFinished=true;
  clearInterval(timerInterval);

  fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({
      type:"SUBMIT_RESPONSE",
      examId,
      studentName:nameInput.value,
      roll:rollInput.value,
      email:emailInput.value,
      timeTaken:Math.floor((Date.now()-startTime)/1000),
      answers:Object.keys(answers).map(qid=>({qid,answer:answers[qid]}))
    })
  }).finally(()=>{
    document.body.innerHTML="<h2>Exam Submitted</h2>";
    if(document.fullscreenElement) document.exitFullscreen();
  });
}
</script>

</body>
</html>
