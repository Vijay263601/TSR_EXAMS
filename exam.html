<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Online Exam</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family: Arial, sans-serif;
  background:#f1f5f9;
  padding:20px;
}
.container{
  max-width:800px;
  margin:auto;
  background:#fff;
  padding:25px;
  border-radius:12px;
}
.hidden{ display:none }

input{
  width:100%;
  padding:12px;
  margin:8px 0;
}

.option{
  padding:12px;
  border:1px solid #cbd5f5;
  margin-bottom:10px;
  cursor:pointer;
  border-radius:8px;
}
.option.selected{
  background:#2563eb;
  color:#fff;
}

.timer{
  color:#dc2626;
  font-weight:bold;
}

button{
  padding:10px 16px;
  background:#2563eb;
  color:#fff;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
button.secondary{
  background:#64748b;
  margin-right:8px;
}

.question-image{
  max-width:100%;
  max-height:260px;
  display:block;
  margin:12px auto;
  border-radius:10px;
  border:1px solid #e5e7eb;
}
</style>
</head>

<body>

<!-- STUDENT FORM -->
<div class="container" id="studentForm">
  <h2>Student Details</h2>
  <p><b>Fullscreen is mandatory.</b></p>
  <input id="nameInput" placeholder="Full Name">
  <input id="emailInput" placeholder="Email">
  <input id="rollInput" placeholder="Roll No">
  <button onclick="startExam()">Start Exam</button>
</div>

<!-- EXAM PAGE -->
<div class="container hidden" id="examPage">
  <div>
    Exam ID: <span id="examIdText"></span>
    <span class="timer" id="timer"></span>
  </div>

  <h3 id="questionText"></h3>

  <!-- IMAGE -->
  <img id="questionImage" class="question-image hidden">

  <div id="options"></div>

  <button class="secondary" onclick="prev()">Previous</button>
  <button onclick="next()">Next</button>
  <button onclick="submitExam()">Submit</button>
</div>

<script>
/* ================= CONFIG ================= */
const API_URL = "https://script.google.com/macros/s/AKfycbyzARFGPJ6-nYRu-QGgwZ3dTgBCiSqpEqPvt6IGRSem1bIgD-E6aVYo4jxMz-x4H8AR/exec";
const examId = new URLSearchParams(location.search).get("examId");
document.getElementById("examIdText").textContent = examId;

const IS_ANDROID = /Android/i.test(navigator.userAgent);

/* ================= STATE ================= */
let questions = [];
let answers = {};
let current = 0;
let duration = 0;
let timerInterval;
let startTime;
let examStarted = false;
let examFinished = false;
let cheated = false;
let cheatReason = "";

/* ================= FULLSCREEN HELPERS ================= */
function enterFullscreen(){
  const el = document.documentElement;
  return el.requestFullscreen?.() || el.webkitRequestFullscreen?.();
}
function isFullscreen(){
  return document.fullscreenElement || document.webkitFullscreenElement;
}

/* ================= START EXAM ================= */
async function startExam(){
  if(!nameInput.value || !emailInput.value || !rollInput.value){
    alert("Fill all details");
    return;
  }

  /* FULLSCREEN MUST BE TRIGGERED BY CLICK */
  try{
    await enterFullscreen();
  }catch{
    alert("Fullscreen is required to start the exam");
    return;
  }

  studentForm.classList.add("hidden");
  examPage.classList.remove("hidden");

  try{
    /* GET CONFIG (ANDROID SAFE) */
    const cfgRes = await fetch(API_URL,{
      method:"POST",
      body: JSON.stringify({ type:"GET_EXAM_CONFIG", examId })
    });
    const cfg = JSON.parse(await cfgRes.text());

    /* GET QUESTIONS (ANDROID SAFE) */
    const qRes = await fetch(API_URL,{
      method:"POST",
      body: JSON.stringify({ type:"GET_QUESTIONS", examId })
    });
    questions = JSON.parse(await qRes.text());

    duration = Number(cfg.duration);

    if(!questions.length || !duration){
      alert("Exam data error");
      submitExam();
      return;
    }

  }catch(err){
    console.error(err);
    alert("Server error. Try again.");
    submitExam();
    return;
  }

  examStarted = true;
  startTime = Date.now();
  renderQuestion();
  startTimer();
}

/* ================= RENDER ================= */
function renderQuestion(){
  const q = questions[current];
  if(!q) return;

  questionText.textContent = `Q${current+1}. ${q.question}`;

  /* IMAGE SUPPORT */
  const img = document.getElementById("questionImage");
  if(q.imageURL){
    img.src = q.imageURL;
    img.classList.remove("hidden");
  }else{
